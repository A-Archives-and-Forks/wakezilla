name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            frontend

      - name: Install Clippy
        run: rustup component add clippy

      - name: Prepare frontend assets for backend lint
        run: |
          mkdir -p target/frontend-dist
          printf '<!doctype html><html><head><title>wakezilla</title></head><body></body></html>\n' > target/frontend-dist/index.html

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  install-script:
    name: install script
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check shell syntax
        run: sh -n install.sh scripts/test-install-sh.sh

      - name: Run installer tests
        run: scripts/test-install-sh.sh

  windows:
    name: windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            frontend

      - name: Prepare frontend assets for backend checks
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path target/frontend-dist | Out-Null
          Set-Content -NoNewline -Path target/frontend-dist/index.html -Value '<!doctype html><html><head><title>wakezilla</title></head><body></body></html>'

      - name: Run PowerShell installer tests
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/test-install-ps1.ps1

      - name: Check Windows backend
        run: cargo check -p wakezilla --all-targets --locked

      - name: Run Windows backend tests
        run: cargo test -p wakezilla -p wakezilla-common --locked

  frontend:
    name: frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup nightly Rust toolchain and wasm target
        run: rustup toolchain install nightly --profile minimal --target wasm32-unknown-unknown --allow-downgrade

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend

      - name: Install Trunk
        uses: taiki-e/install-action@v2
        with:
          tool: trunk

      - name: Build frontend
        env:
          NO_COLOR: "true"
          RUSTUP_TOOLCHAIN: nightly
        run: cd frontend && trunk build --release

  coverage:
    name: coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            frontend

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Prepare frontend assets for backend tests
        run: |
          mkdir -p target/frontend-dist target/llvm-cov-target/frontend-dist
          printf '<!doctype html><html><head><title>wakezilla</title></head><body></body></html>\n' | tee target/frontend-dist/index.html > target/llvm-cov-target/frontend-dist/index.html

      - name: Run tests with cargo-llvm-cov
        run: cargo llvm-cov --workspace --cobertura --output-path cobertura.xml
