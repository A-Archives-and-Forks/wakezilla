name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            frontend

      - name: Install Clippy
        run: rustup component add clippy

      - name: Install desktop tray Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev

      - name: Prepare frontend assets for backend lint
        run: |
          mkdir -p target/frontend-dist
          printf '<!doctype html><html><head><title>wakezilla</title></head><body></body></html>\n' > target/frontend-dist/index.html

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --locked --features desktop-tray -- -D warnings

  install-script:
    name: install script
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check shell syntax
        run: sh -n install.sh scripts/test-install-sh.sh

      - name: Run installer tests
        run: scripts/test-install-sh.sh

  install-diagnostics:
    name: install diagnostics (ubuntu 26.04)
    runs-on: ubuntu-26.04
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Capture host diagnostics
        run: |
          set -euo pipefail
          mkdir -p install-diagnostics
          {
            echo "== runner =="
            echo "RUNNER_OS=${RUNNER_OS:-}"
            echo "ImageOS=${ImageOS:-}"
            echo "ImageVersion=${ImageVersion:-}"
            echo
            echo "== uname =="
            uname -a
            uname -m
            echo
            echo "== os-release =="
            cat /etc/os-release
            echo
            echo "== libc =="
            command -v ldd || true
            ldd --version 2>&1 || true
            echo
            echo "== musl loader probe =="
            ls -la /lib/ld-musl-*.so.* 2>/dev/null || true
            echo
            echo "== install env overrides =="
            echo "TARGET=${TARGET:-}"
            echo "WAKEZILLA_LIBC=${WAKEZILLA_LIBC:-}"
            echo "WAKEZILLA_SUDO_SYMLINK=${WAKEZILLA_SUDO_SYMLINK:-}"
          } | tee install-diagnostics/host.txt

      - name: Run installer with shell trace
        id: install
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/wakezilla-bin" install-diagnostics
          set +e
          (
            set -x
            BIN_DIR="$RUNNER_TEMP/wakezilla-bin" \
              WAKEZILLA_SUDO_SYMLINK=no \
              sh ./install.sh
          ) > install-diagnostics/install.log 2>&1
          install_status=$?
          set -e
          printf '%s\n' "$install_status" > install-diagnostics/install-status.txt
          cat install-diagnostics/install.log
          exit "$install_status"

      - name: Inspect installed files
        if: always()
        run: |
          set -euo pipefail
          {
            echo "== install status =="
            cat install-diagnostics/install-status.txt 2>/dev/null || true
            echo
            echo "== installed directory =="
            ls -la "$RUNNER_TEMP/wakezilla-bin" 2>/dev/null || true
            echo
            echo "== wakezilla =="
            if [ -x "$RUNNER_TEMP/wakezilla-bin/wakezilla" ]; then
              file "$RUNNER_TEMP/wakezilla-bin/wakezilla" || true
              ldd "$RUNNER_TEMP/wakezilla-bin/wakezilla" 2>&1 || true
              "$RUNNER_TEMP/wakezilla-bin/wakezilla" --version || true
            else
              echo "wakezilla was not installed"
            fi
            echo
            echo "== wakezilla-tray =="
            if [ -x "$RUNNER_TEMP/wakezilla-bin/wakezilla-tray" ]; then
              file "$RUNNER_TEMP/wakezilla-bin/wakezilla-tray" || true
              ldd "$RUNNER_TEMP/wakezilla-bin/wakezilla-tray" 2>&1 || true
            else
              echo "wakezilla-tray was not installed"
            fi
          } | tee install-diagnostics/installed.txt

      - name: Assert Ubuntu uses GNU release asset
        if: always()
        run: |
          set -euo pipefail
          arch=$(uname -m)
          case "$arch" in
            x86_64|amd64) expected_target="x86_64-unknown-linux-gnu" ;;
            arm64|aarch64) expected_target="aarch64-unknown-linux-gnu" ;;
            *) echo "unsupported diagnostic architecture: $arch" >&2; exit 1 ;;
          esac

          grep -F "installing wakezilla for $expected_target" install-diagnostics/install.log
          if grep -E "retrying with .*linux-musl|asset: .*linux-musl" install-diagnostics/install.log; then
            echo "installer selected or fell back to a musl asset on Ubuntu 26.04" >&2
            exit 1
          fi

      - name: Upload installer diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wakezilla-install-diagnostics-ubuntu-26.04
          path: install-diagnostics/
          if-no-files-found: error

  windows:
    name: windows
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            frontend

      - name: Prepare frontend assets for backend checks
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path target/frontend-dist | Out-Null
          Set-Content -NoNewline -Path target/frontend-dist/index.html -Value '<!doctype html><html><head><title>wakezilla</title></head><body></body></html>'

      - name: Run PowerShell installer tests
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/test-install-ps1.ps1

      - name: Check Windows backend
        run: cargo check -p wakezilla --all-targets --locked --features desktop-tray

      - name: Run Windows backend tests
        run: cargo test -p wakezilla -p wakezilla-common --locked

  frontend:
    name: frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup nightly Rust toolchain and wasm target
        run: rustup toolchain install nightly --profile minimal --target wasm32-unknown-unknown --allow-downgrade

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend

      - name: Install Trunk
        uses: taiki-e/install-action@v2
        with:
          tool: trunk

      - name: Build frontend
        env:
          NO_COLOR: "true"
          RUSTUP_TOOLCHAIN: nightly
        run: cd frontend && trunk build --release

  coverage:
    name: coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            frontend

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Prepare frontend assets for backend tests
        run: |
          mkdir -p target/frontend-dist target/llvm-cov-target/frontend-dist
          printf '<!doctype html><html><head><title>wakezilla</title></head><body></body></html>\n' | tee target/frontend-dist/index.html > target/llvm-cov-target/frontend-dist/index.html

      - name: Run tests with cargo-llvm-cov
        run: cargo llvm-cov --workspace --cobertura --output-path cobertura.xml
